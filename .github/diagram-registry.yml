# Diagram Registry — maps code paths to Excalidraw architecture diagrams.
# Used by .github/workflows/pr-diagram-linker.yml and /diagram-linker command.
#
# Format:
#   id:          unique slug
#   path:        relative path to the .excalidraw or .excalidraw.md file
#   description: short label shown in PR table
#   triggers:    list of glob patterns — if any changed file matches, the diagram is linked
#
# Special: system-overview uses "**" but only matches when 10+ files change.

diagrams:
  # ── System-wide ──
  - id: system-overview
    path: docs/architecture/diagrams/excalidraw/obsidian/20260216-212852-arch-system-overview-v1.excalidraw
    description: "Full system overview — all layers"
    triggers:
      - "**"

  - id: eagle-platform
    path: docs/architecture/diagrams/excalidraw/obsidian/20260217-195858-arch-eagle-platform-v1.excalidraw
    description: "EAGLE platform architecture"
    triggers:
      - "server/**"
      - "client/**"
      - "eagle-plugin/**"

  - id: nci-oa-agent-comparison
    path: docs/architecture/diagrams/excalidraw/obsidian/20260216-212852-arch-nci-oa-agent-comparison-v1.excalidraw
    description: "NCI OA agent architecture comparison"
    triggers:
      - "eagle-plugin/agents/**"
      - "server/app/sdk_agentic_service.py"

  # ── Backend ──
  - id: backend-services
    path: docs/architecture/diagrams/excalidraw/obsidian/20260216-212852-arch-backend-services-v1.excalidraw
    description: "FastAPI routes, services, tool dispatch"
    triggers:
      - "server/app/**"

  - id: tool-execution
