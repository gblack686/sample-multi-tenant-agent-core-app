# ─────────────────────────────────────────────────────────────
# Linear → Claude Code Agent
# ─────────────────────────────────────────────────────────────
#
# Polls Linear for issues labeled `claude-ready`, executes each
# one using Claude Code CLI in an isolated branch, creates a PR,
# and updates the Linear issue with progress/results.
#
# Linear workspace: AI Agent Mastery-gb (team key: AI)
#
# Requirements:
#   - Repository secret: ANTHROPIC_API_KEY
#   - Repository secret: LINEAR_API_KEY
#
# Trigger:
#   - Cron: every 15 minutes
#   - Manual: workflow_dispatch (optional issue_identifier input)
#
# ─────────────────────────────────────────────────────────────

name: Linear Claude Agent

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      issue_identifier:
        description: "Target a specific Linear issue (e.g., AI-298)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Prevent overlapping runs
concurrency:
  group: linear-claude-agent
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
# Linear workflow state IDs (AI Agent Mastery-gb workspace)
# ─────────────────────────────────────────────────────────────
env:
  LINEAR_STATE_TODO: "ec91ffef-e7bc-4631-99f0-2a6037c7c53a"
  LINEAR_STATE_IN_PROGRESS: "996b7495-45c7-450d-bdbe-664a122120ee"
  LINEAR_STATE_IN_REVIEW: "8af7b8c3-74c8-4efd-958a-722603f175f6"
  LINEAR_STATE_DONE: "42702dca-ff28-49d4-b731-236a5b05ac88"

jobs:
  # ───────────────────────────────────────────────────────────
  # Job 1: Poll Linear for claude-ready issues
  # ───────────────────────────────────────────────────────────
  poll-linear:
    name: Poll Linear
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.query.outputs.matrix }}
      has_issues: ${{ steps.query.outputs.has_issues }}
    steps:
      - name: Query Linear for claude-ready issues
        id: query
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          linear_query() {
            curl -s -X POST https://api.linear.app/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: $LINEAR_API_KEY" \
              -d "$1"
          }

          INPUT_IDENTIFIER="${{ inputs.issue_identifier }}"

          if [ -n "$INPUT_IDENTIFIER" ]; then
            # Fetch a specific issue by identifier
            RESPONSE=$(linear_query "{
              \"query\": \"query { issueSearch(filter: { identifier: { eq: \\\"$INPUT_IDENTIFIER\\\" } }, first: 1) { nodes { id identifier title description } } }\"
            }")

            ISSUES=$(echo "$RESPONSE" | jq -c '[.data.issueSearch.nodes[] | {id: .id, identifier: .identifier, title: .title, description: (.description // "No description provided.")}]')
          else
            # Poll for unstarted issues with claude-ready label (max 3)
            RESPONSE=$(linear_query "{
              \"query\": \"query { issues(first: 3, filter: { state: { type: { eq: \\\"unstarted\\\" } }, labels: { some: { name: { eq: \\\"claude-ready\\\" } } } }) { nodes { id identifier title description } } }\"
            }")

            ISSUES=$(echo "$RESPONSE" | jq -c '[.data.issues.nodes[] | {id: .id, identifier: .identifier, title: .title, description: (.description // "No description provided.")}]')
          fi

          COUNT=$(echo "$ISSUES" | jq 'length')
          echo "Found $COUNT issue(s)"

          if [ "$COUNT" -eq 0 ]; then
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"issue\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
            # Build matrix JSON
            MATRIX=$(echo "$ISSUES" | jq -c '{issue: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "Issues to process:"
            echo "$ISSUES" | jq '.[].identifier'
          fi

  # ───────────────────────────────────────────────────────────
  # Job 2: Execute each issue with Claude Code
  # ───────────────────────────────────────────────────────────
  execute-issue:
    name: "Execute ${{ matrix.issue.identifier }}"
    needs: poll-linear
    if: needs.poll-linear.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.poll-linear.outputs.matrix) }}
      max-parallel: 1
      fail-fast: false

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      BRANCH_NAME: "linear/${{ matrix.issue.identifier }}"

    steps:
      # ── Setup ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete remote branch if it exists (retry scenario)
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          git checkout -b "$BRANCH_NAME"

      # ── Move Linear issue → In Progress ────────────────────
      - name: Move issue to In Progress
        run: |
          ISSUE_ID="${{ matrix.issue.id }}"

          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_ID\\\", input: { stateId: \\\"$LINEAR_STATE_IN_PROGRESS\\\" }) { success } }\"}"

          echo "Moved ${{ matrix.issue.identifier }} → In Progress"

      # ── Run Claude Code ────────────────────────────────────
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are working on Linear issue ${{ matrix.issue.identifier }}: ${{ matrix.issue.title }}

            ## Description
            ${{ matrix.issue.description }}

            ## Instructions
            - Implement the requested change in this repository
            - Follow existing patterns in the codebase (see CLAUDE.md)
            - Run lint/type checks before finishing: `ruff check app/` for Python, `npx tsc --noEmit` for TypeScript
            - Commit your changes with a descriptive message referencing ${{ matrix.issue.identifier }}
            - If this is an analysis-only task with no code changes needed, explain your findings
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 10"

      # ── Check for changes ──────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git add -A
            # Commit any uncommitted changes Claude may have left
            git diff --cached --quiet || git commit -m "[${{ matrix.issue.identifier }}] Claude Code changes"
          elif [ "$(git rev-list --count HEAD ^origin/main)" -gt 0 ] 2>/dev/null; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Push & Create PR (if changes) ─────────────────────
      - name: Push branch and create PR
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push -u origin "$BRANCH_NAME"

          PR_TITLE="[${{ matrix.issue.identifier }}] ${{ matrix.issue.title }}"

          # Truncate title to 256 chars (GitHub limit)
          PR_TITLE="${PR_TITLE:0:256}"

          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$(cat <<'EOF'
          ## Linear Issue
          Resolves ${{ matrix.issue.identifier }}

          ## Description
          ${{ matrix.issue.description }}

          ---
          🤖 Automated by [Linear Claude Agent](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME" 2>&1) || true

          # If PR already exists, get its URL
          if echo "$PR_URL" | grep -q "already exists"; then
            PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q '.url' 2>/dev/null || echo "")
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR: $PR_URL"

      # ── Update Linear: PR created → In Review ─────────────
      - name: Update Linear (PR created)
        if: steps.changes.outputs.has_changes == 'true' && steps.pr.outputs.pr_url != ''
        run: |
          ISSUE_ID="${{ matrix.issue.id }}"
          PR_URL="${{ steps.pr.outputs.pr_url }}"

          # Escape the comment body for JSON
          COMMENT_BODY="🤖 **Claude Code** created a PR for this issue:\\n\\n🔗 ${PR_URL}\\n\\n[GitHub Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          # Add comment
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"$COMMENT_BODY\\\" }) { success } }\"}"

          # Move to In Review
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_ID\\\", input: { stateId: \\\"$LINEAR_STATE_IN_REVIEW\\\" }) { success } }\"}"

          echo "Moved ${{ matrix.issue.identifier }} → In Review"

      # ── Update Linear: No changes → Done ───────────────────
      - name: Update Linear (analysis only)
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          ISSUE_ID="${{ matrix.issue.id }}"

          COMMENT_BODY="🤖 **Claude Code** analyzed this issue — no code changes were needed.\\n\\n[GitHub Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          # Add comment
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"$COMMENT_BODY\\\" }) { success } }\"}"

          # Move to Done
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_ID\\\", input: { stateId: \\\"$LINEAR_STATE_DONE\\\" }) { success } }\"}"

          echo "Moved ${{ matrix.issue.identifier }} → Done"

      # ── On failure: comment error, move back to Todo ───────
      - name: Handle failure
        if: failure()
        run: |
          ISSUE_ID="${{ matrix.issue.id }}"

          COMMENT_BODY="⚠️ **Claude Code** encountered an error processing this issue.\\n\\n[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\\n\\nThe issue has been moved back to Todo."

          # Add comment
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"$COMMENT_BODY\\\" }) { success } }\"}"

          # Move back to Todo
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_ID\\\", input: { stateId: \\\"$LINEAR_STATE_TODO\\\" }) { success } }\"}"

          echo "Moved ${{ matrix.issue.identifier }} → back to Todo (failure)"
