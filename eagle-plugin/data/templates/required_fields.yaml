# Required and recommended sections per document type.
# Used by document_agent.py for post-generation validation.

sow:
  display_name: "Statement of Work"
  required_sections:
    - title
    - background_and_purpose
    - scope
    - period_of_performance
    - tasks
    - deliverables
  recommended_sections:
    - applicable_standards
    - place_of_performance
    - security_requirements
    - qasp
    - contractor_personnel
    - travel_requirements

igce:
  display_name: "Independent Government Cost Estimate"
  required_sections:
    - title
    - purpose
    - methodology
    - cost_breakdown
    - total_estimated_cost
  recommended_sections:
    - assumptions
    - confidence_level
    - data_sources
    - cost_by_period

acquisition_plan:
  display_name: "Acquisition Plan"
  required_sections:
    - title
    - statement_of_need
    - competition_strategy
    - contract_type
    - milestones
  recommended_sections:
    - cost_estimate
    - set_aside_decision
    - source_selection
    - budgeting_and_funding
    - risks
    - acquisition_streamlining

justification:
  display_name: "Justification & Approval"
  required_sections:
