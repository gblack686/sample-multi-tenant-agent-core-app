AWSTemplateFormatVersion: 2010-09-09
Description: Eagle EC2 - GitHub Self-Hosted Runner
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Application Configuration
        Parameters:
          - appName
          - environment
      - Label:
          default: EC2 Configuration
        Parameters:
          - instanceType
          - vpcId
          - subnetId
          - allowedSshCidr
    ParameterLabels:
      appName:
        default: Application Name
      environment:
        default: Environment
      instanceType:
        default: Instance Type
      vpcId:
        default: VPC ID
      subnetId:
        default: Subnet ID
      allowedSshCidr:
        default: Allowed SSH CIDR

Parameters:
  appName:
    Type: String
    Description: Application Name
    Default: eagle
    MinLength: 1
    MaxLength: 32

  environment:
    Type: String
    Description: Environment (dev, qa, stage, prod)
    Default: dev
    AllowedValues:
      - dev
      - qa
      - stage
      - prod

  instanceType:
    Type: String
    Description: EC2 instance type
    Default: t3.medium
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge

  vpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch the instance in

  subnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch the instance in

  allowedSshCidr:
    Type: String
    Description: CIDR block allowed for SSH access
    Default: 10.0.0.0/8
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  latestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Latest Amazon Linux 2023 AMI from SSM Parameter Store
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  # -----------------------------------------------------------
  # IAM Role with PowerUser access for EC2
  # -----------------------------------------------------------
  ec2PowerUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'power-user-${appName}-ec2Role-${environment}'
      PermissionsBoundary: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/PermissionBoundary_PowerUser'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Description: !Sub 'PowerUser role for ${appName} EC2 GitHub self-hosted runner (${environment})'
      MaxSessionDuration: 3600
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Tags:
        - Key: Application
          Value: !Ref appName
        - Key: Environment
          Value: !Ref environment
        - Key: ManagedBy
          Value: CloudFormation

  ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub 'power-user-${appName}-ec2-profile-${environment}'
      Path: /
      Roles:
        - !Ref ec2PowerUserRole

  # -----------------------------------------------------------
  # EC2 Key Pair (private key stored in SSM Parameter Store)
  # -----------------------------------------------------------
  ec2KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${appName}-runner-keypair-${environment}'
      KeyType: ed25519
      Tags:
        - Key: Application
          Value: !Ref appName
        - Key: Environment
          Value: !Ref environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------
  # Security Group
  # -----------------------------------------------------------
  ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${appName}-ec2-sg-${environment}'
      GroupDescription: !Sub 'Security group for ${appName} EC2 GitHub runner (${environment})'
      VpcId: !Ref vpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref allowedSshCidr
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Application
          Value: !Ref appName
        - Key: Environment
          Value: !Ref environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------
  # EC2 Instance - Amazon Linux 2023
  # -----------------------------------------------------------
  ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref instanceType
      IamInstanceProfile: !Ref ec2InstanceProfile
      ImageId: !Ref latestAmiId
      KeyName: !Ref ec2KeyPair
      SubnetId: !Ref subnetId
      SecurityGroupIds:
        - !GetAtt ec2SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # -------------------------------------------------------
          # Amazon Linux 2023 - GitHub Self-Hosted Runner Bootstrap
          # -------------------------------------------------------

          # Update system packages
          dnf update -y

          # Install essential tools
          dnf install -y \
            git \
            docker \
            jq \
            curl \
            unzip \
            tar \
            gcc \
            openssl-devel

          # Enable and start Docker
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ec2-user

          # Install AWS CLI v2 (latest)
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --update
          rm -rf /tmp/aws /tmp/awscliv2.zip

          # Create runner directory
          mkdir -p /opt/actions-runner
          chown ec2-user:ec2-user /opt/actions-runner

          # Signal success
          echo "Bootstrap complete" > /var/log/bootstrap-complete.log
      Tags:
        - Key: Name
          Value: !Sub '${appName}-runner-${environment}'
        - Key: Application
          Value: !Ref appName
        - Key: Environment
          Value: !Ref environment
        - Key: Purpose
          Value: github-self-hosted-runner
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref ec2Instance
    Export:
      Name: !Sub '${appName}-${environment}-InstanceId'

  PrivateIp:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt ec2Instance.PrivateIp
    Export:
      Name: !Sub '${appName}-${environment}-PrivateIp'

  Ec2PowerUserRoleArn:
    Description: ARN of the EC2 PowerUser Role
    Value: !GetAtt ec2PowerUserRole.Arn
    Export:
      Name: !Sub '${appName}-${environment}-Ec2PowerUserRoleArn'

  SecurityGroupId:
    Description: Security Group ID
    Value: !GetAtt ec2SecurityGroup.GroupId
    Export:
      Name: !Sub '${appName}-${environment}-Ec2SecurityGroupId'

  KeyPairId:
    Description: Key Pair ID
    Value: !GetAtt ec2KeyPair.KeyPairId
    Export:
      Name: !Sub '${appName}-${environment}-KeyPairId'

  PrivateKeySsmParameter:
    Description: SSM Parameter Store path for the private key
    Value: !Sub '/ec2/keypair/${ec2KeyPair.KeyPairId}'
    Export:
      Name: !Sub '${appName}-${environment}-PrivateKeySsmPath'
