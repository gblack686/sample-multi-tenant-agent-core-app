AWSTemplateFormatVersion: 2010-09-09
Description: Eagle S3 Storage Resources
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Application Configuration
        Parameters:
          - appName
          - environment
      - Label:
          default: S3 Configuration
        Parameters:
          - enableVersioning
          - lifecycleDays
    ParameterLabels:
      appName:
        default: Application Name
      environment:
        default: Environment
      enableVersioning:
        default: Enable Versioning
      lifecycleDays:
        default: Lifecycle Days

Parameters:
  appName:
    Type: String
    Description: Application Name
    Default: eagle
    MinLength: 1
    MaxLength: 32

  environment:
    Type: String
    Description: Environment (dev, qa, stage, prod)
    Default: dev
    AllowedValues:
      - dev
      - qa
      - stage
      - prod

  enableVersioning:
    Type: String
    Description: Enable S3 versioning
    Default: Enabled
    AllowedValues:
      - Enabled
      - Suspended

  lifecycleDays:
    Type: Number
    Description: Days before transitioning objects to Glacier (0 to disable)
    Default: 90
    MinValue: 0
    MaxValue: 365

Resources:
  s3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${appName}-${environment}-data-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: !Ref enableVersioning
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: !If [HasLifecycle, Enabled, Disabled]
            Transitions:
              - TransitionInDays: !Ref lifecycleDays
                StorageClass: GLACIER
          - Id: DeleteOldVersions
            Status: !If [HasVersioning, Enabled, Disabled]
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Application
          Value: !Ref appName
        - Key: Environment
          Value: !Ref environment
        - Key: ManagedBy
          Value: CloudFormation

  s3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref s3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt s3Bucket.Arn
              - !Sub '${s3Bucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

Conditions:
  HasLifecycle: !Not [!Equals [!Ref lifecycleDays, 0]]
  HasVersioning: !Equals [!Ref enableVersioning, Enabled]

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref s3Bucket
    Export:
      Name: !Sub '${appName}-${environment}-BucketName'

  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt s3Bucket.Arn
    Export:
      Name: !Sub '${appName}-${environment}-BucketArn'

  BucketDomainName:
    Description: Domain name of the S3 bucket
    Value: !GetAtt s3Bucket.DomainName
    Export:
      Name: !Sub '${appName}-${environment}-BucketDomainName'
