services:
  backend:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DEV_MODE=true
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    volumes:
      - ../server/app:/app/app
      - ${HOME}/.aws:/home/appuser/.aws

  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - FASTAPI_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../client/app:/app/app
      - ../client/components:/app/components
      - ../client/hooks:/app/hooks
      - ../client/contexts:/app/contexts
      - ../client/lib:/app/lib
      - ../client/types:/app/types

  # Excalidraw MCP App server — standalone Node.js service
  # Exposes the MCP Apps protocol endpoint (POST /mcp) so Claude.ai
  # or any MCP Apps-compatible host can use it via custom connector.
  # The EAGLE admin diagrams page connects to this for full MCP Apps support.
  excalidraw-mcp:
    build:
      context: ../client/mcp-apps/excalidraw
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
