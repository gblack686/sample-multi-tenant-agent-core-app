services:
  backend:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DEV_MODE=true
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      # AWS SSO support: if AWS_PROFILE is set, use credential process
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_SDK_LOAD_CONFIG=1
    volumes:
      - ../server/app:/app/app
      # Mount AWS credentials directory for SSO (read-only)
      # On Windows Git Bash: ${HOME}/.aws works
      # On Windows CMD/PowerShell: use %USERPROFILE%\.aws
      # Alternative: set AWS_CONFIG_DIR env var before running docker compose
      - ${AWS_CONFIG_DIR:-${HOME}/.aws}:/root/.aws:ro

  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - FASTAPI_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../client/app:/app/app
      - ../client/components:/app/components
      - ../client/hooks:/app/hooks
      - ../client/contexts:/app/contexts
      - ../client/lib:/app/lib
      - ../client/types:/app/types
